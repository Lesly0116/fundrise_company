spring.config.import=optional:file:.env

# Server
server.port=8080
spring.application.name=fundrise-api

# Database - LIRE DEPUIS LES VARIABLES D'ENVIRONNEMENT UNIQUEMENT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# JWT - avec fallback (si variable non trouvée)
app.jwt.secret=fundrise-super-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm
app.jwt.expiration=86400000
# Stripe - LIRE DEPUIS LES VARIABLES D'ENVIRONNEMENT
stripe.secret_key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.fundrise=${LOGGING_LEVEL_COM_FUNDRISE:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.show-details=when-authorized

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# Local image storage
app.uploads.dir=${UPLOADS_DIR:uploads}
app.uploads.base-url=${APP_BASE_URL:http://localhost:8080}

# Email
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Static files
spring.web.resources.static-locations=file:../frontend/build/,classpath:/static/
spring.web.resources.cache.period=0
spring.web.resources.add-mappings=true